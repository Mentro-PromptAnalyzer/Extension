<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- Trail: heavy Y blur + downward offset -->
    <filter id="trail" x="-40%" y="-20%" width="180%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5 16"/>
      <feOffset dx="0" dy="12"/>
    </filter>

    <!-- Second trail pass: slightly different offset for layered depth -->
    <filter id="trail2" x="-40%" y="-20%" width="180%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4 10"/>
      <feOffset dx="0" dy="6"/>
    </filter>

    <!-- Wide ambient -->
    <filter id="ambient" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9"/>
    </filter>

    <!-- Tight rim -->
    <filter id="tight" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- 1. Wide ambient — deep violet base, full opacity -->
  <path
    d="M28 100 L28 28 L41 28 Q64 60 64 60 Q87 28 87 28 L100 28 L100 100 L87 100 L87 54 L67 80 L61 80 L41 54 L41 100 Z"
    fill="#6d28d9"
    filter="url(#ambient)"
    opacity="0.9"
  />

  <!-- 2. First trail pass — vivid violet -->
  <path
    d="M28 100 L28 28 L41 28 Q64 60 64 60 Q87 28 87 28 L100 28 L100 100 L87 100 L87 54 L67 80 L61 80 L41 54 L41 100 Z"
    fill="#9333ea"
    filter="url(#trail)"
    opacity="0.95"
  />

  <!-- 3. Second trail pass — brighter, shorter — builds up density -->
  <path
    d="M28 100 L28 28 L41 28 Q64 60 64 60 Q87 28 87 28 L100 28 L100 100 L87 100 L87 54 L67 80 L61 80 L41 54 L41 100 Z"
    fill="#a855f7"
    filter="url(#trail2)"
    opacity="0.85"
  />

  <!-- 4. Tight bright rim — almost white-violet -->
  <path
    d="M28 100 L28 28 L41 28 Q64 60 64 60 Q87 28 87 28 L100 28 L100 100 L87 100 L87 54 L67 80 L61 80 L41 54 L41 100 Z"
    fill="#e9d5ff"
    filter="url(#tight)"
    opacity="1"
  />

  <!-- 5. Crisp white M -->
  <path
    d="M28 100 L28 28 L41 28 Q64 60 64 60 Q87 28 87 28 L100 28 L100 100 L87 100 L87 54 L67 80 L61 80 L41 54 L41 100 Z"
    fill="white"
  />
</svg>
