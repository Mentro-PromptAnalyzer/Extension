name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Job 1: unit tests + type check ──────────────────────────────────────────
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage
        # vitest exits non-zero when thresholds are not met,
        # which will fail the PR check automatically.

  # ── Job 2: E2E popup smoke tests ────────────────────────────────────────────
  e2e:
    name: E2E smoke tests (popup)
    runs-on: ubuntu-latest
    needs: unit
    # Only runs after unit tests pass — fail-fast so E2E doesn't waste runner
    # time when type check or unit tests are already broken.
    # Each job runs on a fresh runner, so the extension is rebuilt here.

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build
        env:
          # The background worker reads this at runtime via import.meta.env.
          # Provide a placeholder so the build doesn't fail — E2E tests never
          # hit the Fly.dev backend.
          VITE_SCORE_URL: https://placeholder.invalid

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
